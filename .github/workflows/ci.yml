name: CI

on:
  push:
  pull_request:
  workflow_call:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5

      - name: Install Zuban
        run: pip install zuban

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: xvfb-run -a npm run test

      - name: Run checking of the auto formatter
        run: npm run check-format
